services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: content_search
      POSTGRES_PASSWORD: content_search
      POSTGRES_DB: content_search
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://content_search:content_search@db:5432/content_search
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
